{% extends "base.html" %}
{% block content %}
<h1>Register</h1>
{% if errors %}
    <ul class="error">
    {% for field, msgs in errors.items() %}
        {% for m in msgs %}<li>{{ field }}: {{ m }}</li>{% endfor %}
    {% endfor %}
    </ul>
{% endif %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email: <input type="email" name="email" required></label><br>
    <label>Username: <input type="text" name="username" required pattern="[a-zA-Z0-9_-]{3,80}"></label><br>
    <label>Password: <input type="password" name="password" required minlength="8"></label><br>
    <label>Bio: <textarea name="bio" maxlength="500"></textarea></label><br>
    {# ✅ Pas de champ is_admin exposé #}
    <button type="submit">Register</button>
</form>
{% endblock %}
